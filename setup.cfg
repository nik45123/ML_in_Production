[flake8]

exclude = 
    src/config
    src/config/.env
    src/db/db.sqlite
    src/logs
    src/model/models
extend-ignore = 
    E501,
    F401
    N803, N806
    S301, S403
    WPS111, W291, WPS305, WPS306, WPS326, WPS420, WPS432, WPS604
per-file-ignore=
    src/config/__init__.py: D104, F401, WPS412, WPS300

max-line-complexity=16
max-local-variables=10